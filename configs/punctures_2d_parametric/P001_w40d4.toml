schema_version = 2
name = "P001_parametric_2d_w40d4"
dtype = "float64"
seed = 503

[geometry]
coordinate_system = "SinhSymTP"
AMAX = 1.0e6
bScale = 2.5
SINHWAA = 0.07

[physics]
bare_mass_0 = 0.5
bare_mass_1 = 0.5
zPunc = 2.5
P0_x = 0.0
P0_y = 0.0
P0_z = 0.0
P1_x = 0.0
P1_y = 0.0
P1_z = 0.0
S0_x = 0.0
S0_y = 0.0
S1_x = 0.0
S1_y = 0.0

[parameter.equal_spin_sz]
minimum = -0.2
maximum = 0.2
sampling = "cell_centered"

[domain]
xx0_min = 9.0e-4
xx0_max = 1.0
xx1_min = 1.0e-5
xx1_max = 3.141582653589793
xx1_parity_delta_max = 0.1

[collocation]
