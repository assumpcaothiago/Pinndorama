schema_version = 4
name = "T005 1D spherical toy w40d4 Xavier first-order endpoint Robin"
dtype = "float64"

[geometry]
coordinate_system = "SinhSpherical"
AMPL = 1.0e6
SINHW = 0.07

[physics]
m = 1.0

[architecture]
layers = [1, 40, 40, 40, 40, 1]
activation = "tanh"
initialization = "xavier"

[ansatz]
output_transform = "smooth_inverse_radius"

[loss]
interior_residual = "r_times_spherical_pde"
interior_weight = 1.0
origin_regularity_weight = 1.0
outer_boundary_condition = "first_order_robin"
outer_boundary_region = "endpoint"
outer_boundary_weight = 1.0

[collocation]
sampling = "cell_centered"
Nxx0 = 256
xx0_min = 0.0
xx0_max = 1.0

[training]
seed = 503
adam_steps = 1500
adam_learning_rate = 1.0e-4
adam_min_learning_rate = 1.0e-7
gradient_clip = 1.0
ssbroyden_steps = 10000
ssbroyden_rtol = 1.0e-12
ssbroyden_atol = 1.0e-12
log_every = 100
checkpoint_every = 1000
