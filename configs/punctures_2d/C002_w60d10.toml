schema_version = 2
name = "C002 2D 384x192 w60d10"
dtype = "float64"

[geometry]
coordinate_system = "SinhSymTP"
AMAX = 1.0e6
bScale = 2.5
SINHWAA = 0.07

[physics]
bare_mass_0 = 0.5
bare_mass_1 = 0.5
zPunc = 2.5
P0_x = 0.0
P0_y = 0.0
P0_z = 0.0
P1_x = 0.0
P1_y = 0.0
P1_z = 0.0
S0_x = 0.0
S0_y = 0.0
S0_z = 0.2
S1_x = 0.0
