Nxx1 = 192
xx0_min = 0.0
xx0_max = 1.0
xx1_min = 0.0
xx1_max = 3.141592653589793
xx1_parity_delta_max = 0.1

[training]
seed = 503
adam_steps = 1500
adam_learning_rate = 1.0e-4
adam_min_learning_rate = 1.0e-7
gradient_clip = 1.0
ssbroyden_steps = 50000
ssbroyden_rtol = 1.0e-12
ssbroyden_atol = 1.0e-12
log_every = 100
checkpoint_every = 1000
